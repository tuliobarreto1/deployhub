<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeployHub</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f4f0;
      --bg-card: #ffffff;
      --bg-glass: rgba(255,255,255,0.6);
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.15);
      --text: #0f0f0f;
      --text-muted: #6b6b6b;
      --text-faint: #a0a0a0;
      --accent: #1a1a2e;
      --accent2: #4f46e5;
      --accent3: #06b6d4;
      --tag-bg: rgba(79,70,229,0.08);
      --tag-text: #4f46e5;
      --dot: rgba(0,0,0,0.12);
      --glow: rgba(79,70,229,0.15);
      --shadow: 0 2px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.05);
      --shadow-hover: 0 12px 48px rgba(79,70,229,0.15), 0 2px 8px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --bg: #0a0a0f;
      --bg-card: #13131a;
      --bg-glass: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.12);
      --text: #f0f0f5;
      --text-muted: #8888aa;
      --text-faint: #444460;
      --accent: #e0e0ff;
      --accent2: #818cf8;
      --accent3: #22d3ee;
      --tag-bg: rgba(129,140,248,0.1);
      --tag-text: #818cf8;
      --dot: rgba(255,255,255,0.06);
      --glow: rgba(129,140,248,0.2);
      --shadow: 0 2px 24px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.3);
      --shadow-hover: 0 12px 48px rgba(129,140,248,0.2), 0 2px 8px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 20%, var(--glow) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.4s;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.4s, border-color 0.4s;
    }
    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--text);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      display: inline-block;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.7; }
    }
    .nav-right { display: flex; align-items: center; gap: 24px; }
    .nav-status {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .theme-toggle {
      background: var(--bg-glass);
      border: 1px solid var(--border-strong);
      border-radius: 100px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--accent2); background: var(--tag-bg); }
    .hero {
      position: relative;
      z-index: 1;
      padding: 160px 48px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .hero-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }
    .hero-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.35s;
    }
    .hero-meta {
      margin-top: 48px;
      display: flex;
      align-items: center;
      gap: 32px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.65s;
    }
    .hero-count { display: flex; flex-direction: column; gap: 2px; }
    .hero-count-num {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      line-height: 1;
      color: var(--text);
    }
    .hero-count-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
    }
    .hero-divider { width: 1px; height: 40px; background: var(--border-strong); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .section {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 48px 120px;
    }
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 40px;
    }
    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }
    .section-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-faint);
    }
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease, border-color 0.3s;
      box-shadow: var(--shadow);
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent2), var(--accent3));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); border-color: var(--border-strong); }
    .card:hover::before { opacity: 1; }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), var(--glow) 0%, transparent 7%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      border-radius: 20px;
    }
    .card:hover::after { opacity: 1; }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .card-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: var(--tag-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      border: 1px solid var(--border);
      transition: transform 0.3s;
    }
    .card:hover .card-icon { transform: scale(1.1) rotate(-3deg); }
    .card-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--bg-glass);
    }
    .card-badge.live { color: #22c55e; border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); }
    .card-badge.wip { color: #f59e0b; border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); }
    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.6;
      font-weight: 300;
      margin-bottom: 20px;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--tag-bg);
      color: var(--tag-text);
      letter-spacing: 0.04em;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .card-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent2);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: gap 0.2s;
    }
    .card:hover .card-link { gap: 10px; }
    .card-link-arrow { transition: transform 0.2s; }
    .card:hover .card-link-arrow { transform: translateX(4px); }
    .card-soon {
      background: transparent;
      border: 1px dashed var(--border-strong);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      gap: 12px;
      opacity: 0.5;
      transition: opacity 0.3s;
    }
    .card-soon:hover { opacity: 0.8; transform: none; box-shadow: none; }
    .card-soon-icon { font-size: 1.5rem; color: var(--text-faint); }
    .card-soon-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 32px 48px;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-left { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--text-faint); }
    .footer-right {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .footer-right span { color: var(--accent2); }
    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      .hero { padding: 120px 24px 60px; }
      .section { padding: 0 24px 80px; }
      footer { padding: 24px; flex-direction: column; gap: 8px; text-align: center; }
      .apps-grid { grid-template-columns: 1fr; }
      .hero-meta { gap: 20px; }
      .nav-status { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">
      <span class="nav-logo-dot"></span>
      DeployHub
    </div>
    <div class="nav-right">
      <div class="nav-status">
        <span class="status-dot"></span>
        todos sistemas operacionais
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">◐ dark</button>
    </div>
  </nav>

  <section class="hero">
    <p class="hero-eyebrow">deployhub.duckdns.org</p>
    <h1 class="hero-title">
      <span style="font-family:'DM Sans',sans-serif;font-weight:300;letter-spacing:-0.04em;">Deploy<span style="font-weight:500;background:linear-gradient(135deg,var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Hub</span></span>
    </h1>
    <div class="hero-meta">
      <div class="hero-count">
        <span class="hero-count-num" id="app-count">—</span>
        <span class="hero-count-label">aplicações</span>
      </div>
      <div class="hero-divider"></div>
      <div class="hero-count">
        <span class="hero-count-num">100%</span>
        <span class="hero-count-label">uptime</span>
      </div>
      <div class="hero-divider"></div>
      <div class="hero-count">
        <span class="hero-count-num">VPS</span>
        <span class="hero-count-label">self-hosted</span>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="section-header">
      <h2 class="section-title">Aplicações</h2>
      <div class="section-line"></div>
      <span class="section-count" id="section-count">— — live</span>
    </div>

    <div class="apps-grid" id="apps-grid"></div>
  </section>

  <footer>
    <div class="footer-left">© 2025 DeployHub — self-hosted com ♥</div>
    <div class="footer-right">
      powered by <span>Coolify</span> · Hetzner VPS
    </div>
  </footer>

  <script>
    // ── Theme ────────────────────────────────────────────────
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById('themeBtn');
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      btn.textContent = isDark ? '◐ dark' : '○ light';
    }
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('themeBtn').textContent = '○ light';
    }

    // ── Card glow helper ─────────────────────────────────────
    function attachGlow(card) {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        card.style.setProperty('--mx', x + '%');
        card.style.setProperty('--my', y + '%');
      });
    }

    // ── Build a single app card ───────────────────────────────
    function buildCard(app, index) {
      const delay = ((index + 1) * 0.1).toFixed(1);
      const badgeClass = app.status === 'live' ? 'live' : app.status === 'wip' ? 'wip' : '';
      const badgeLabel = app.status === 'live' ? '● live' : app.status === 'wip' ? '◑ wip' : app.status;
      const tagsHTML = (app.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

      const card = document.createElement('a');
      card.className = 'card';
      card.href = app.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.style.animationDelay = `${delay}s`;
      card.innerHTML = `
        <div class="card-header">
          <div class="card-icon">${app.icon}</div>
          <span class="card-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        <h3 class="card-title">${app.name}</h3>
        <p class="card-desc">${app.description}</p>
        <div class="card-tags">${tagsHTML}</div>
        <div class="card-footer">
          <span class="card-link">
            Acessar aplicação
            <span class="card-link-arrow">→</span>
          </span>
        </div>`;

      attachGlow(card);
      return card;
    }

    // ── Build "em breve" placeholder ─────────────────────────
    function buildSoonCard(index) {
      const delay = ((index + 1) * 0.1).toFixed(1);
      const card = document.createElement('div');
      card.className = 'card card-soon';
      card.style.animationDelay = `${delay}s`;
      card.innerHTML = `
        <div class="card-soon-icon">+</div>
        <span class="card-soon-text">em breve</span>`;
      return card;
    }

    // ── Load apps.json and render ────────────────────────────
    async function loadApps() {
      const grid = document.getElementById('apps-grid');
      try {
        const res = await fetch('apps.json?v=' + Date.now());
        if (!res.ok) throw new Error('Failed to load apps.json');
        const data = await res.json();
        const apps = data.apps || [];

        // Update counters
        const liveCount = apps.filter(a => a.status === 'live').length;
        document.getElementById('app-count').textContent = apps.length;
        const pad = n => String(n).padStart(2, '0');
        document.getElementById('section-count').textContent =
          `${pad(liveCount)} — live`;

        // Render app cards
        apps.forEach((app, i) => grid.appendChild(buildCard(app, i)));

        // Always show at least one "em breve" slot
        // Fill to align with 3-column grid (keep at least 1 placeholder)
        const cols = 3;
        const total = apps.length;
        const remainder = total % cols;
        const placeholders = remainder === 0 ? 1 : cols - remainder;
        for (let i = 0; i < placeholders; i++) {
          grid.appendChild(buildSoonCard(total + i));
        }
      } catch (err) {
        console.error('DeployHub: could not load apps.json', err);
        grid.innerHTML = '<p style="color:var(--text-muted);font-family:\'DM Mono\',monospace;font-size:.8rem">Não foi possível carregar os apps.</p>';
      }
    }

    loadApps();
  </script>
</body>
</html>
